name: OLMT+ELM simple site test

on:
    push:
      branches: [develop]
    pull_request:
      branches: [develop]
    schedule:
      # every day at 7am UTC.  We want nightly runs to catch errors
      # introduced when NGEE-Arctic/E3SM is updated, since the tests here depend on the latest E3SM code.
      - cron: "0 7 * * *"
    workflow_dispatch:

jobs:
    test-site:
      if: github.event_name != 'schedule'
      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
      steps:
        - name: Checkout OLMT repo
          uses: actions/checkout@v6
          with:
            ref: rich/simple-era5-merge  # NOTE: This branch is temporary and will be removed once the changes are merged to develop!  The changes on this branch are needed to get the tests to run.
            path: OLMT

        # Note that changes in the E3SM repo could break the tests here, but this is intentional
        # since we want know if the latest E3SM code breaks OLMT.
        - name: Checkout NGEE-Arctic/E3SM develop branch
          uses: actions/checkout@v6
          with:
            repository: NGEE-Arctic/E3SM
            ref: develop
            path: E3SM
            submodules: recursive

        - name: Prepare output dir
          run: mkdir -p ${{ github.workspace }}/output

        - name: Clone data repo
          uses: actions/checkout@v6
          with:
            repository: NGEE-Arctic/field-to-model-inputdata
            ref: main
            path: field-to-model-inputdata
            fetch-depth: 0

        - name: Data repo E3SM sparse checkout
          run: |
            cd field-to-model-inputdata
            git sparse-checkout init --cone
            git sparse-checkout set E3SM

        - name: Run test case for site
          run: |
            # ensure writable by current user
            chmod -R u+rwX .cache/inputdata || true

            docker run --rm -v ${{ github.workspace }}:/home/e3smuser \
              -v ${{ github.workspace }}/field-to-model-inputdata/E3SM:/home/e3smuser/inputdata \
              -w /home/e3smuser/OLMT \
              yuanfornl/ngee-arctic-modex26:models-main-latest \
              ./site_fullrun.py \
              --machine docker \
              --compiler gnu --mpilib openmpi \
              --site AK-SP-K64G --sitegroup NGEEArctic \
              --cpl_bypass --gswp3 \
              --metdir /home/e3smuser/inputdata/atm/datm7/gswp3/kg \
              --domainfile /home/e3smuser/inputdata/share/domains/domain.clm/domain.lnd.1x1pt_kougarok-GRID_navy.nc \
              --surffile /home/e3smuser/inputdata/lnd/clm2/surfdata_map/surfdata_1x1pt_kougarok-GRID_simyr1850_c360x720_c171002.nc \
              --landusefile /home/e3smuser/inputdata/lnd/clm2/surfdata_map/landuse.timeseries_1x1pt_kougarok-GRID_simyr1850-2015_c180423.nc \
              --nofire --no_budgets --nopointdata \
              --model_root /home/e3smuser/E3SM --runroot /home/e3smuser/output \
              --ccsm_input /home/e3smuser/inputdata \
              --nyears_ad_spinup 1 --nyears_final_spinup 1 --nyears_transient 1